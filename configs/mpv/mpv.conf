
# --- GENERAL ---
keep-open=yes
save-position-on-quit=yes
save-watch-history=yes
fullscreen=yes
cursor-autohide=1000
border=no
msg-color=yes
msg-module=yes

# --- VIDEO Y RENDERIZADO ---
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe

# --- AUDIO ---
volume=100
volume-max=150
audio-channels=auto
alang=es,spa,en,eng

# --- SUBTÍTULOS ---
slang=es,spa,en,eng
sub-auto=fuzzy
sub-file-paths=sub:subtitles:subs
sub-font="Inter"
sub-font-size=45
sub-color="#FFFFFFFF"
sub-border-color="#FF262626"
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-spacing=0.5

# --- OSD (On Screen Display) ---
osd-bar-align-y=-1
osd-bar-h=3
osd-border-size=1
osd-color='#CCFFFFFF'
osd-border-color='#DD322640'

# --- SCREENSHOTS ---
screenshot-format=png
screenshot-png-compression=8
screenshot-template='~/Pictures/Screenshots/mpv_%F_%wHh%wMm%wSs'

# --- PERFILES AUTOMÁTICOS ---

[protocol.https]
cache=yes
demuxer-max-bytes=500M
demuxer-max-back-bytes=100M

[high-quality]
profile-desc="High quality rendering"
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
video-sync=display-resample
interpolation=yes
tscale=oversample

general {
    lock_cmd = pidof hyprlock || hyprlock       # Qué usar para bloquear
    before_sleep_cmd = loginctl lock-session    # BLOQUEO AL CERRAR TAPA 
    after_sleep_cmd = hyprctl dispatch dpms on  # Despertar monitor
}

# Bloqueo por inactividad
listener {
    timeout = 600                                
    on-timeout = loginctl lock-session           
}

# Apagar pantalla 
listener {
    timeout = 660                                
    on-timeout = hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on         
}
